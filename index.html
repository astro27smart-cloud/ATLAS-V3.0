<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATLAS V3.0 | Neural Link</title>
    <style>
        :root { --cyan: #00d4ff; --mag: #ff00ff; --bg: #050505; --glass: rgba(10, 10, 15, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; color: white; display: flex; }
        #starfield { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }
        
        /* Sidebar */
        #sidebar { width: 280px; background: rgba(0, 0, 0, 0.9); border-right: 1px solid rgba(0, 212, 255, 0.1); display: flex; flex-direction: column; backdrop-filter: blur(15px); z-index: 10; }
        .nav-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #new-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--cyan); color: var(--cyan); cursor: pointer; font-weight: bold; letter-spacing: 1px; transition: 0.3s; }
        #new-btn:hover { background: var(--cyan); color: black; }
        #chat-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .chat-item { padding: 12px; margin-bottom: 8px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); border-left: 2px solid transparent; }
        .chat-item:hover { background: rgba(255,255,255,0.07); }
        .chat-item.active { border-left-color: var(--cyan); background: rgba(0, 212, 255, 0.05); }
        .actions { display: flex; gap: 10px; opacity: 0.3; }
        .chat-item:hover .actions { opacity: 1; }
        .icon-btn { cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { color: var(--cyan); }
        .del-btn:hover { color: #ff4444; }

        /* Main Terminal */
        #app { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        #terminal { width: 90%; height: 85vh; background: var(--glass); border: 1px solid rgba(0, 212, 255, 0.1); display: flex; flex-direction: column; }
        header { padding: 15px 25px; border-bottom: 1px solid rgba(0, 212, 255, 0.1); display: flex; justify-content: space-between; align-items: center; }
        #feed { flex-grow: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .bubble { max-width: 80%; padding: 14px 20px; border-radius: 4px; font-size: 0.95rem; line-height: 1.6; }
        .user { align-self: flex-end; border-right: 3px solid var(--mag); background: rgba(255, 0, 255, 0.03); }
        .twin { align-self: flex-start; border-left: 3px solid var(--cyan); background: rgba(0, 212, 255, 0.03); color: #ddd; }
        .input-area { padding: 25px; display: flex; gap: 15px; background: rgba(0,0,0,0.4); }
        input { flex-grow: 1; background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 14px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--cyan); }
        #send-btn { background: var(--cyan); color: black; border: none; padding: 0 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body>
<canvas id="starfield"></canvas>

<div id="sidebar">
    <div class="nav-header"><button id="new-btn" onclick="startFresh()">INITIALIZE SYNC</button></div>
    <div id="chat-list"></div>
</div>

<div id="app">
    <div id="terminal">
        <header>
            <div style="color:var(--cyan); font-weight:bold; letter-spacing: 2px;">ATLAS V3.0</div>
            <div id="status" style="font-size:0.7rem; opacity:0.5;">AWAITING NEURAL INPUT</div>
        </header>
        <div id="feed"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Send a message to begin..." autocomplete="off">
            <button id="send-btn" onclick="sync()">SEND</button>
        </div>
    </div>
</div>

<script>
    // Starfield (Essential for vibe)
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 150}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5, v: Math.random()*0.4}));
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#fff";
        stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y += s.v; if(s.y > canvas.height) s.y = 0; });
        requestAnimationFrame(draw);
    }
    init(); draw();

    // The Twin Brain Logic
    let chats = JSON.parse(localStorage.getItem('atlas_v3_data')) || [];
    let activeId = null;

    function save() { localStorage.setItem('atlas_v3_data', JSON.stringify(chats)); render(); }

    function startFresh() {
        activeId = null;
        document.getElementById('feed').innerHTML = '';
        document.getElementById('status').innerText = "NEW LINK PENDING";
        render();
    }

    function render() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        chats.forEach(c => {
            const el = document.createElement('div');
            el.className = `chat-item ${c.id === activeId ? 'active' : ''}`;
            el.innerHTML = `
                <span onclick="load(${c.id})">${c.name}</span>
                <div class="actions">
                    <span class="icon-btn" onclick="rename(${c.id})">✎</span>
                    <span class="icon-btn del-btn" onclick="remove(${c.id})">×</span>
                </div>
            `;
            list.appendChild(el);
        });
    }

    function load(id) {
        activeId = id;
        const chat = chats.find(c => c.id === id);
        document.getElementById('feed').innerHTML = '';
        chat.history.forEach(m => addUI(m.text, m.role));
        render();
    }

    function rename(id) {
        const chat = chats.find(c => c.id === id);
        const n = prompt("Edit link identifier:", chat.name);
        if(n) { chat.name = n; save(); }
    }

    function remove(id) {
        if(confirm("Terminate this neural link?")) {
            chats = chats.filter(c => c.id !== id);
            if(activeId === id) startFresh();
            save();
        }
    }

    async function sync() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        // If this is the start of a brand new conversation
        if(activeId === null) {
            activeId = Date.now();
            chats.unshift({ id: activeId, name: text.substring(0, 25), history: [] });
        }

        const currentChat = chats.find(c => c.id === activeId);
        addUI(text, 'user');
        currentChat.history.push({ role: 'user', text });
        input.value = '';
        document.getElementById('status').innerText = "SYNCING...";

        try {
            const res = await fetch('/api/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: text, history: currentChat.history })
            });
            const data = await res.json();
            addUI(data.text, 'twin');
            currentChat.history.push({ role: 'twin', text: data.text });
            document.getElementById('status').innerText = "ACTIVE";
            save();
        } catch (e) { addUI("Link Severed.", 'twin'); }
    }

    function addUI(txt, cls) {
        const d = document.createElement('div');
        d.className = `bubble ${cls}`;
        d.innerText = txt;
        const f = document.getElementById('feed');
        f.appendChild(d);
        f.scrollTop = f.scrollHeight;
    }

    if(chats.length > 0) load(chats[0].id);
    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key==='Enter') sync(); });
</script>
</body>
</html>
