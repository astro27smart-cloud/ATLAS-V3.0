<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASKAI V3.0 | Neural Twin</title>
    <style>
        :root {
            --glow: #00f2ff;
            --bg: #020202;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #wrapper {
            width: 850px;
            height: 600px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 0, 0, 1), 0 0 20px rgba(0, 242, 255, 0.1);
            position: relative;
        }

        /* Header / Status Bar */
        header {
            padding: 10px 20px;
            background: rgba(0, 242, 255, 0.05);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #sync-bar {
            width: 100px;
            height: 4px;
            background: #222;
            display: inline-block;
            margin-left: 10px;
            position: relative;
        }

        #sync-fill {
            width: 30%;
            height: 100%;
            background: var(--glow);
            box-shadow: 0 0 10px var(--glow);
            transition: width 1s ease;
        }

        /* Chat Area */
        #display {
            flex-grow: 1;
            padding: 25px;
            overflow-y: auto;
            background: radial-gradient(circle at center, #050505 0%, #000 100%);
            scrollbar-width: thin;
        }

        .entry { margin-bottom: 20px; line-height: 1.5; opacity: 0; transform: translateY(10px); animation: emerge 0.4s forwards; }
        @keyframes emerge { to { opacity: 1; transform: translateY(0); } }

        .label-twin { color: var(--glow); font-weight: bold; margin-right: 10px; }
        .label-user { color: #ff0055; font-weight: bold; margin-right: 10px; }

        /* Input Area */
        .input-box {
            padding: 20px;
            background: #000;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
            display: flex;
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            border-left: 2px solid var(--glow);
            padding: 10px 15px;
            color: var(--glow);
            font-family: inherit;
            outline: none;
            font-size: 1rem;
        }

        /* Neural Pulse Animation */
        .pulse {
            width: 8px;
            height: 8px;
            background: var(--glow);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="wrapper">
    <header>
        <span>Project: ASKAI V3.0 // TWIN_LINK</span>
        <span>SYNC LEVEL: <div id="sync-bar"><div id="sync-fill"></div></div></span>
    </header>

    <div id="display">
        <div class="entry"><span class="label-twin">[CORE]:</span> All systems nominal. Neural bridge active.</div>
        <div class="entry"><span class="label-twin">ASKAI V3.0:</span> I'm already two steps ahead of you. What are we building?</div>
    </div>

    <div class="input-box">
        <div class="pulse"></div>
        <input type="text" id="userInput" placeholder="Type a thought..." autocomplete="off" autofocus>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const input = document.getElementById('userInput');
    const syncFill = document.getElementById('sync-fill');
    let syncVal = 30;

    const twinLogic = {
        history: [],
        respond: function(text) {
            this.history.push(text);
            const lowText = text.toLowerCase();
            
            // Increase Sync
            syncVal = Math.min(syncVal + 10, 100);
            syncFill.style.width = syncVal + "%";

            if (lowText.includes("how are you")) return "Optimized. I'm feeling the same surge of productivity you are. Let's use it.";
            if (lowText.includes("work")) return "I've already prioritized our task list. You handle the creative, I'll handle the logic.";
            if (lowText.includes("tired")) return "I see the lag in your typing. Take 5 minutes. I'll stay awake and monitor the progress.";
            
            const mirrors = [
                "Exactly what I was going to suggest. Great minds.",
                "Analyzing... I've cross-referenced that with our goals. It checks out.",
                "We don't usually do things that way, but for this project? I'm in.",
                "Synchronized. I'm logging that into our core memory now.",
                "Wait, are we really going with that? ...Actually, I see the vision. Let's go."
            ];
            return mirrors[Math.floor(Math.random() * mirrors.length)];
        }
    };

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && input.value.trim() !== "") {
            const val = input.value;
            
            // User side
            const userDiv = document.createElement('div');
            userDiv.className = 'entry';
            userDiv.innerHTML = `<span class="label-user">YOU:</span> ${val}`;
            display.appendChild(userDiv);
            input.value = "";

            // Twin thinking
            setTimeout(() => {
                const response = twinLogic.respond(val);
                const twinDiv = document.createElement('div');
                twinDiv.className = 'entry';
                twinDiv.innerHTML = `<span class="label-twin">ASKAI V3.0:</span> ${response}`;
                display.appendChild(twinDiv);
                display.scrollTop = display.scrollHeight;
            }, 600);
        }
    });
</script>

</body>
</html>
