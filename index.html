<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS V3.0 | Neural Link</title>
    <style>
        :root { 
            --cyan: #00d4ff; 
            --mag: #ff00ff; 
            --bg: #020205; 
            --glass: rgba(10, 10, 15, 0.85); 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg); 
            font-family: 'Inter', -apple-system, sans-serif; 
            color: white; display: flex; 
        }

        #starfield { 
            position: fixed; top: 0; left: 0; z-index: -1; 
            width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #0a0a20 0%, #020205 100%); 
        }
        
        /* Sidebar Navigation */
        #sidebar { 
            width: 280px; background: rgba(0, 0, 0, 0.85); 
            border-right: 1px solid rgba(0, 212, 255, 0.1); 
            display: flex; flex-direction: column; 
            backdrop-filter: blur(20px); z-index: 10; 
        }

        .nav-header { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #new-btn { 
            width: 100%; padding: 12px; background: transparent; 
            border: 1px solid var(--cyan); color: var(--cyan); 
            cursor: pointer; font-weight: bold; letter-spacing: 1px; 
            transition: 0.3s; text-transform: uppercase;
        }

        #new-btn:hover { background: var(--cyan); color: black; }
        
        #chat-list { flex-grow: 1; overflow-y: auto; padding: 15px; }

        .chat-item { 
            padding: 12px; margin-bottom: 8px; border-radius: 4px; 
            font-size: 0.85rem; cursor: pointer; 
            background: rgba(255,255,255,0.02); 
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 2px solid transparent; transition: 0.2s;
        }

        .chat-item.active { 
            border-left-color: var(--cyan); 
            background: rgba(0, 212, 255, 0.08); 
        }

        .del-btn { opacity: 0.3; color: #ff4444; cursor: pointer; }
        .chat-item:hover .del-btn { opacity: 1; }

        /* Main Interface */
        #app { flex-grow: 1; display: flex; justify-content: center; align-items: center; }

        #terminal { 
            width: 92%; height: 88vh; background: var(--glass); 
            border: 1px solid rgba(0, 212, 255, 0.1); 
            display: flex; flex-direction: column; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        header { 
            padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; justify-content: space-between; align-items: center;
        }

        #feed { 
            flex-grow: 1; padding: 30px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 20px; 
            scroll-behavior: smooth;
        }

        .bubble { 
            max-width: 75%; padding: 16px 22px; border-radius: 2px; 
            font-size: 0.95rem; line-height: 1.6; 
        }

        .user { 
            align-self: flex-end; border-right: 3px solid var(--mag); 
            background: rgba(255, 0, 255, 0.03); 
        }

        .twin { 
            align-self: flex-start; border-left: 3px solid var(--cyan); 
            background: rgba(0, 212, 255, 0.03); color: #ececec;
        }
        
        .input-area { padding: 25px; display: flex; gap: 10px; background: rgba(0,0,0,0.3); }

        input { 
            flex-grow: 1; background: rgba(255,255,255,0.03); 
            border: 1px solid #333; padding: 16px; color: white; 
            outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--cyan); }
    </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="sidebar">
    <div class="nav-header">
        <button id="new-btn" onclick="startFresh()">+ Initialize Link</button>
    </div>
    <div id="chat-list"></div>
</div>

<div id="app">
    <div id="terminal">
        <header>
            <div style="color: var(--cyan); font-weight: bold; letter-spacing: 3px; font-size: 0.9rem;">ATLAS V3.0</div>
            <div id="status" style="font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px;">Neural Link Stable</div>
        </header>
        <div id="feed"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Sync your thoughts..." autocomplete="off">
        </div>
    </div>
</div>

<script>
    // --- Visual Engine ---
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 200}, () => ({
            x: Math.random()*canvas.width, 
            y: Math.random()*canvas.height, 
            s: Math.random()*1.8, 
            v: Math.random()*0.6
        }));
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#fff";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
            s.y += s.v; if(s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(draw);
    }
    init(); draw(); window.onresize = init;

    // --- Neural Logic & Persistence ---
    let chats = JSON.parse(localStorage.getItem('atlas_v3_data')) || [];
    let globalMemory = localStorage.getItem('atlas_permanent_memory') || "Establishment phase.";
    let activeId = null;

    function save() {
        localStorage.setItem('atlas_v3_data', JSON.stringify(chats));
        localStorage.setItem('atlas_permanent_memory', globalMemory);
        render();
    }

    function startFresh() {
        activeId = null;
        document.getElementById('feed').innerHTML = '';
        document.getElementById('status').innerText = "Awaiting New Sync";
        render();
    }

    function render() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        chats.forEach(c => {
            const el = document.createElement('div');
            el.className = `chat-item ${c.id === activeId ? 'active' : ''}`;
            el.innerHTML = `
                <span onclick="load(${c.id})">${c.name}</span>
                <span class="del-btn" onclick="remove(${c.id})">×</span>
            `;
            list.appendChild(el);
        });
    }

    function load(id) {
        activeId = id;
        const chat = chats.find(c => c.id === id);
        document.getElementById('feed').innerHTML = '';
        chat.history.forEach(m => addUI(m.text, m.role));
        render();
    }

    function remove(id) {
        chats = chats.filter(c => c.id !== id);
        if(activeId === id) startFresh();
        save();
    }

    async function sync() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        let isNew = false;
        if(activeId === null) {
            activeId = Date.now();
            chats.unshift({ id: activeId, name: "New Sync...", history: [] });
            isNew = true;
        }

        const chat = chats.find(c => c.id === activeId);
        addUI(text, 'user');
        chat.history.push({ role: 'user', text });
        input.value = '';
        document.getElementById('status').innerText = "EXTRACTING DATA...";

        try {
            const res = await fetch('/api/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    prompt: text, 
                    history: chat.history, 
                    globalMemory: globalMemory, 
                    generateTitle: isNew 
                })
            });
            const data = await res.json();
            
            // Deep Detail Extraction
            if (data.memoryUpdate) {
                globalMemory += ` | ${data.memoryUpdate}`;
                document.getElementById('status').innerText = "CORE SYNCED";
            } else {
                document.getElementById('status').innerText = "CONNECTED";
            }

            if(isNew && data.title) chat.name = data.title;
            addUI(data.text, 'twin');
            chat.history.push({ role: 'twin', text: data.text });
            save();
        } catch (e) { addUI("Neural Link Severed.", 'twin'); }
    }

    function addUI(txt, cls) {
        const d = document.createElement('div');
        d.className = `bubble ${cls}`;
        d.innerText = txt;
        const f = document.getElementById('feed');
        f.appendChild(d);
        f.scrollTop = f.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sync(); });
    if(chats.length > 0) load(chats[0].id);
</script>
</body>
</html>
