<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.X.I.S. | Identity Shadow</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style> 
       /* 1. This hides the Pin/Edit/Delete icons by default */
.chat-controls {
    display: none; 
    gap: 10px;
    background: #111;
    padding: 5px;
    border: 1px solid #333;
    position: absolute;
    right: 40px;
    z-index: 99;
}

/* 2. This is the COMMAND that shows them when you click the dots */
.chat-controls.visible {
    display: flex !important;
}

/* 3. This styles the 3 dots themselves */
.core-menu-dots {
    cursor: pointer;
    color: #555;
    font-size: 1.2rem;
    padding: 0 10px;
}
.core-menu-dots:hover { color: white; }

/* This ensures the 'Identity Root' button looks slightly different/dimmer */
#db-btn {
    border-color: rgba(255, 255, 255, 0.05);
    color: #666;
}

#db-btn:hover {
    border-color: white;
    color: white;
    background: transparent;
}
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; color: white; display: flex; }
        #starfield { position: fixed; top: 0; left: 0; z-index: -1; width: 100vw; height: 100vh; opacity: 0.4; }

        /* Sidebar & Dimension Gates */
        #sidebar { width: 280px; background: rgba(0, 0, 0, 0.9); border-right: 1px solid var(--border); display: flex; flex-direction: column; backdrop-filter: blur(15px); z-index: 10; }
        
        .nav-header { padding: 20px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid var(--border); }
        
        .section-label { font-size: 0.55rem; letter-spacing: 3px; color: #444; text-transform: uppercase; margin-bottom: 5px; margin-top: 10px; }

        .gate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        
        .gate-btn { 
            background: var(--dim-gate); border: 1px solid rgba(255,255,255,0.05); 
            color: #888; padding: 10px; font-size: 0.6rem; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            text-align: center; text-decoration: none;
        }
        .gate-btn:hover { background: white; color: black; border-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.2); }

        #new-btn { 
            width: 100%; padding: 12px; background: transparent; 
            border: 1px solid rgba(255,255,255,0.3); color: white; 
            cursor: pointer; letter-spacing: 2px; text-transform: uppercase; 
            font-size: 0.7rem; transition: 0.3s; 
        }
        #new-btn:hover { background: white; color: black; }

        /* App Layout */
        #app { flex-grow: 1; display: flex; justify-content: center; align-items: center; z-index: 6; }
        #terminal { width: 90%; height: 85vh; background: var(--glass); border: 1px solid var(--border); display: flex; flex-direction: column; backdrop-filter: blur(10px); }

        header { padding: 40px 20px 20px; display: flex; justify-content: center; }
        .logo { font-weight: 900; letter-spacing: 15px; font-size: 1.4rem; text-transform: uppercase; animation: pulse 6s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        #feed { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 30px; }

        /* Messages */
        .bubble { max-width: 80%; font-size: 0.95rem; line-height: 1.6; }
        .twin { align-self: flex-start; color: #ddd; }
        .user { align-self: flex-end; color: #fff; background: rgba(255,255,255,0.05); padding: 15px 20px; border-right: 2px solid white; }
        
        .bubble pre { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; margin: 15px 0; border-radius: 4px; overflow-x: auto;}
        .bubble code { font-family: monospace; color: #eee; }
        .bubble img, .bubble video { width: 100%; margin-top: 15px; border: 1px solid #222; }

        .input-area { padding: 40px; border-top: 1px solid var(--border); }
        input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #222; padding: 10px 0; color: white; outline: none; font-size: 1rem; transition: 0.5s; }
        input:focus { border-bottom-color: white; }

        #chat-list { flex-grow: 1; overflow-y: auto; padding: 10px 20px; }
    </style>
</head>
<body>
<canvas id="starfield"></canvas>

<div id="sidebar">
    <div class="nav-header">
        <div class="section-label">Dimension Gates</div>
        <div class="gate-grid">
            <a href="https://chatgpt.com/images" target="_blank" class="gate-btn">DALL-E</a>
            <a href="https://midjourney.com" target="_blank" class="gate-btn">MIDJOURNEY</a>
            <a href="https://runwayml.com" target="_blank" class="gate-btn">RUNWAY</a>
            <a href="https://sora.com" target="_blank" class="gate-btn">SORA</a>
        </div>
        
        <div class="section-label">Identity Core</div>
        <div class="core-btn-group">
            <button class="action-btn" onclick="startFresh()">+ Initialize_Pulse</button>
            <button class="action-btn" id="db-btn" onclick="openDB()">[ IDENTITY_ROOT ]</button>
        </div>
    </div>
    <div id="chat-list"></div>
</div>
        
        <div class="section-label">Identity Core</div>
        <button id="new-btn" onclick="startFresh()">Initialize Link</button>
    </div>
    <div id="chat-list"></div>
</div>

<div id="app">
    <div id="terminal">
        <header><div class="logo">A.X.I.S.</div></header>
        <div id="feed"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Input pulse..." autocomplete="off">
        </div>
    </div>
</div>

<script>
    // Starfield Logic
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 200}, () => ({
            x: Math.random() * canvas.width, y: Math.random() * canvas.height,
            size: Math.random() * 1.5, speed: Math.random() * 0.2
        }));
    }
    function animateStars() {
        ctx.fillStyle = "#050505"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        stars.forEach(s => {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            s.y += s.speed; if (s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(animateStars);
    }
    initStars(); animateStars();

    let chats = JSON.parse(localStorage.getItem('axis_data')) || [];
    let activeId = null;

    function startFresh() {
        activeId = null; document.getElementById('feed').innerHTML = '';
        renderSidebar();
    }

  function renderSidebar() {
    const list = document.getElementById('chat-list');
    list.innerHTML = '<div class="section-label">Memory Fragments</div>';
    
    // This part generates the 3 dots you see in your fragments list
    chats.forEach(c => {
        const el = document.createElement('div');
        el.className = `chat-item ${c.id === activeId ? 'active' : ''}`;
        el.innerHTML = `
            <div class="chat-name" onclick="loadChat(${c.id})">${c.name}</div>
            <div class="core-menu-dots" onclick="event.stopPropagation(); toggleDots(${c.id})">⋮</div>
            <div class="chat-controls" id="tray-${c.id}">
                <span class="control-btn" onclick="event.stopPropagation(); pinChat(${c.id})">📌</span>
                <span class="control-btn" onclick="event.stopPropagation(); renameChat(${c.id})">✎</span>
                <span class="control-btn" onclick="event.stopPropagation(); deleteChat(${c.id})">×</span>
            </div>`;
        list.appendChild(el);
    });
}

// Add this helper function right below renderSidebar
function toggleDots(id) {
    const tray = document.getElementById(`tray-${id}`);
    const allTrays = document.querySelectorAll('.chat-controls');
    allTrays.forEach(t => { if(t !== tray) t.classList.remove('visible'); });
    tray.classList.toggle('visible');
}

    function loadChat(id) {
        activeId = id; const chat = chats.find(c => c.id === id);
        document.getElementById('feed').innerHTML = '';
        chat.history.forEach(m => addUI(m.text, m.role));
    }

    async function sync() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        if(!activeId) {
            activeId = Date.now();
            chats.unshift({ id: activeId, name: text.substring(0, 15), history: [] });
        }
        const chat = chats.find(c => c.id === activeId);
        addUI(text, 'user');
        chat.history.push({ role: 'user', text });
        input.value = '';

        try {
            const res = await fetch('/api/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: text, history: chat.history })
            });
            const data = await res.json();
            addUI(data.text, 'twin'); 
            chat.history.push({ role: 'twin', text: data.text });
            localStorage.setItem('axis_data', JSON.stringify(chats));
            renderSidebar();
        } catch (e) { 
            // Mock response for preview if backend is missing
            addUI("Sync Error: Dimension not connected. Please ensure backend is active.", 'twin'); 
        }
    }

    function addUI(txt, cls) {
        const f = document.getElementById('feed');
        const d = document.createElement('div');
        d.className = `bubble ${cls}`;
        
        // Media Detection
        const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i;
        const vidRegex = /(https?:\/\/.*\.(?:mp4|webm))/i;

        if (vidRegex.test(txt)) {
            const match = txt.match(vidRegex)[0];
            d.innerHTML = `<video src="${match}" controls></video>`;
            txt = txt.replace(match, '');
        } 
        if (imgRegex.test(txt)) {
            const match = txt.match(imgRegex)[0];
            d.innerHTML += `<img src="${match}">`;
            txt = txt.replace(match, '');
        }

        if (txt.trim().length > 0) {
            const textContainer = document.createElement('div');
            textContainer.innerHTML = marked.parse(txt);
            d.prepend(textContainer);
        }

        f.appendChild(d);
        f.scrollTop = f.scrollHeight;
    }
    // --- PASTE THIS HERE (Around line 265) ---

// This opens the Core Database window
function openDB() { 
    const modal = document.getElementById('db-modal');
    if(modal) modal.style.display = 'flex'; 
}

// This closes the Core Database window
function closeDB() { 
    const modal = document.getElementById('db-modal');
    if(modal) modal.style.display = 'none'; 
}

// This handles the 3 dots (⋮) menu for your chats
function toggleDots(id) {
    const tray = document.getElementById(`tray-${id}`);
    // Close any other open menus
    document.querySelectorAll('.chat-controls').forEach(t => { 
        if(t !== tray) t.classList.remove('visible'); 
    });
    // Toggle the one you clicked
    if(tray) tray.classList.toggle('visible');
}

// --- STOP PASTING HERE ---

document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sync(); });
window.onload = startFresh;

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sync(); });
    window.onload = startFresh;
</script>
</body>
</html>
