<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASKAI V3.0 | Neural Link</title>
    <style>
        body {
            background-color: #0f27775;
            color: #d1d5db;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-container {
            width: 550px;
            height: 700px;
            background: #1a1d23;
            border: 1px solid #30363d;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        header {
            padding: 15px 25px;
            background: #21262d;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #238636;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #238636;
        }

        #chat-flow {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* ASKAI V3.0 (Left) */
        .twin-bubble {
            align-self: flex-start;
            background: #2d333b;
            border: 1px solid #444c56;
            color: #adbac7;
        }

        /* You (Right) */
        .user-bubble {
            align-self: flex-end;
            background: #316dca;
            color: #ffffff;
            border-bottom-right-radius: 2px;
        }

        .typing-hint {
            font-size: 0.75rem;
            color: #768390;
            margin: 0 20px 10px;
            display: none;
        }

        .input-section {
            padding: 20px;
            background: #1a1d23;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 12px;
        }

        input {
            flex-grow: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px 15px;
            color: white;
            outline: none;
        }

        button {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover { background: #30363d; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <span style="font-weight: bold; letter-spacing: 1px;">ASKAI // V3.0</span>
        <span style="font-size: 0.8rem;"><span class="status-dot"></span>ACTIVE_SYNC</span>
    </header>
    
    <div id="chat-flow">
        <div class="bubble twin-bubble">Alright, I'm synced up. I’ve got the core data ready—let's see what we're working on today.</div>
    </div>

    <div id="typing" class="typing-hint">ASKAI V3.0 is calculating...</div>

    <div class="input-section">
        <input type="text" id="userInput" placeholder="Message the twin link..." autofocus>
        <button id="sendBtn">SYNC</button>
    </div>
</div>

<script>
    const flow = document.getElementById('chat-flow');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const typing = document.getElementById('typing');

    function send() {
        const val = input.value.trim();
        if (!val) return;

        const uDiv = document.createElement('div');
        uDiv.className = 'bubble user-bubble';
        uDiv.innerText = val;
        flow.appendChild(uDiv);
        input.value = '';
        flow.scrollTop = flow.scrollHeight;

        typing.style.display = 'block';

        setTimeout(() => {
            typing.style.display = 'none';
            const logic = [
                "I was thinking the same thing, actually. Let's make it happen.",
                "That's a solid start. I'll handle the background details while you focus on the main build.",
                "Wait, check that again. I think we can optimize that part easily.",
                "Confirmed. I've logged that into our shared memory bank.",
                "Nice move. I've already mapped out the next two steps based on that.",
                "Fair enough. If we're going that route, I'll adjust the parameters."
            ];
            const tDiv = document.createElement('div');
            tDiv.className = 'bubble twin-bubble';
            tDiv.innerText = logic[Math.floor(Math.random() * logic.length)];
            flow.appendChild(tDiv);
            flow.scrollTop = flow.scrollHeight;
        }, 1100);
    }

    btn.addEventListener('click', send);
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
</script>

</body>
</html>
