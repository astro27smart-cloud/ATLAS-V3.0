<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.X.I.S. | Neural Link</title>
    <style>
        :root { 
            --accent: #ffffff; 
            --dim: #444444; 
            --bg: #000000; 
            --glass: rgba(10, 10, 10, 0.98); 
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; color: white; display: flex; }
        #starfield { position: fixed; top: 0; left: 0; z-index: -1; width: 100vw; height: 100vh; }

        /* Sidebar - Monochrome */
        #sidebar { width: 280px; background: rgba(0, 0, 0, 0.95); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; backdrop-filter: blur(20px); z-index: 10; }
        .nav-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px; }
        #new-btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; font-weight: bold; transition: 0.3s; letter-spacing: 1px; }
        #new-btn:hover { background: var(--accent); color: black; }
        
        #mem-trigger { font-size: 0.7rem; color: var(--accent); cursor: pointer; text-align: center; margin-top: 10px; letter-spacing: 2px; opacity: 0.5; transition: 0.3s; }
        #mem-trigger:hover { opacity: 1; }

        #chat-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .chat-item { padding: 12px; margin-bottom: 8px; border-radius: 2px; font-size: 0.8rem; cursor: pointer; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; border: 1px solid transparent; }
        .chat-item.active { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); }

        /* Main Terminal */
        #app { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        #terminal { width: 94%; height: 90vh; background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; }
        #feed { flex-grow: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; }
        
        .bubble { max-width: 75%; padding: 15px 20px; font-size: 0.9rem; line-height: 1.6; border-radius: 0; }
        .user { align-self: flex-end; background: white; color: black; border: 1px solid white; }
        .twin { align-self: flex-start; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.02); }
        
        .input-area { padding: 30px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; padding: 10px 0; color: white; outline: none; font-size: 1rem; transition: 0.3s; }
        input:focus { border-bottom-color: white; }

        /* Memory Modal */
        #mem-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        #mem-box { width: 500px; background: #000; border: 1px solid #333; padding: 40px; }
        #mem-area { width: 100%; height: 300px; background: #000; color: #fff; border: 1px solid #222; padding: 15px; font-family: monospace; outline: none; }
        .save-btn { background: white; color: black; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; }
        .close-btn { background: #222; color: white; border: none; padding: 12px 25px; cursor: pointer; }
    </style>
</head>
<body>
<canvas id="starfield"></canvas>

<div id="mem-modal">
    <div id="mem-box">
        <h2 style="color:white; margin-top:0; font-size: 0.9rem; letter-spacing: 4px; border-bottom: 1px solid #222; padding-bottom: 10px;">CORE DATA REPOSITORY</h2>
        <textarea id="mem-area"></textarea>
        <div style="display:flex; justify-content: space-between;">
            <button class="close-btn" onclick="toggleMem()">CLOSE</button>
            <button class="save-btn" onclick="saveManualMem()">COMMIT</button>
        </div>
    </div>
</div>

<div id="sidebar">
    <div class="nav-header">
        <button id="new-btn" onclick="startFresh()">+ INITIALIZE LINK</button>
        <div id="mem-trigger" onclick="toggleMem()">[ VIEW CORE DATA ]</div>
    </div>
    <div id="chat-list"></div>
</div>

<div id="app">
    <div id="terminal">
        <header style="padding: 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;">
            <div style="color: white; font-weight: bold; letter-spacing: 5px; font-size: 1.1rem;">A.X.I.S.</div>
            <div id="status" style="font-size: 0.6rem; letter-spacing: 2px; opacity: 0.4;">STATUS: OPERATIONAL</div>
        </header>
        <div id="feed"></div>
        <div class="input-area"><input type="text" id="userInput" placeholder="Send pulse..." autocomplete="off"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = Array.from({length: 250}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.2,
            speed: Math.random() * 0.4 + 0.1
        }));
    }

    function animateStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        stars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
            s.y += s.speed;
            if (s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(animateStars);
    }

    window.addEventListener('resize', initStars);
    initStars();
    animateStars();

    let chats = JSON.parse(localStorage.getItem('axis_data')) || [];
    let globalMemory = localStorage.getItem('axis_memory') || "A.X.I.S. initialized. User is primary operator.";
    let activeId = null;

    function save() {
        localStorage.setItem('axis_data', JSON.stringify(chats));
        localStorage.setItem('axis_memory', globalMemory);
        renderSidebar();
    }

    function toggleMem() {
        const modal = document.getElementById('mem-modal');
        document.getElementById('mem-area').value = globalMemory;
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    function saveManualMem() {
        globalMemory = document.getElementById('mem-area').value;
        save();
        toggleMem();
    }

    function startFresh() {
        activeId = null;
        document.getElementById('feed').innerHTML = '';
        renderSidebar();
    }

    function renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        chats.forEach(c => {
            const el = document.createElement('div');
            el.className = `chat-item ${c.id === activeId ? 'active' : ''}`;
            el.innerHTML = `<span style="flex:1" onclick="loadChat(${c.id})">${c.name}</span> <span onclick="removeChat(${c.id})" style="opacity:0.2">×</span>`;
            list.appendChild(el);
        });
    }

    function loadChat(id) {
        activeId = id;
        const chat = chats.find(c => c.id === id);
        document.getElementById('feed').innerHTML = '';
        chat.history.forEach(m => addUI(m.text, m.role));
        renderSidebar();
    }

    function removeChat(id) {
        chats = chats.filter(c => c.id !== id);
        if(activeId === id) startFresh();
        save();
    }

    async function sync() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        const status = document.getElementById('status');
        if(!text) return;

        if(activeId === null) {
            activeId = Date.now();
            chats.unshift({ id: activeId, name: "Neural Sync", history: [] });
        }

        const chat = chats.find(c => c.id === activeId);
        addUI(text, 'user');
        chat.history.push({ role: 'user', text });
        input.value = '';
        status.innerText = "STATUS: SYNCING...";

        try {
            const res = await fetch('/api/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ prompt: text, history: chat.history, globalMemory: globalMemory, generateTitle: chat.history.length < 3 })
            });

            const data = await res.json();
            if (data.memoryUpdate) globalMemory += ` | ${data.memoryUpdate}`;
            if (data.title) chat.name = data.title;
            
            status.innerText = "STATUS: STABLE";
            addUI(data.text, 'twin'); 
            chat.history.push({ role: 'twin', text: data.text });
            save();
        } catch (e) { status.innerText = "STATUS: SEVERED"; }
    }

    function addUI(txt, cls) {
        const d = document.createElement('div');
        d.className = `bubble ${cls}`;
        d.innerText = txt;
        const f = document.getElementById('feed');
        f.appendChild(d);
        f.scrollTop = f.scrollHeight;
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sync(); });
    if(chats.length > 0) loadChat(chats[0].id);
</script>
</body>
</html>
