<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATLAS V3.0 | Neural Link</title>
    <style>
        :root { --cyan: #00d4ff; --mag: #ff00ff; --bg: #050505; --glass: rgba(15, 15, 20, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Inter', sans-serif; color: white; display: flex; }
        #starfield { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }
        
        /* Sidebar Styles */
        #sidebar { width: 260px; background: rgba(0, 0, 0, 0.8); border-right: 1px solid rgba(0, 212, 255, 0.1); display: flex; flex-direction: column; backdrop-filter: blur(10px); z-index: 10; }
        .nav-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #new-chat-btn { width: 100%; padding: 10px; background: transparent; border: 1px dashed var(--cyan); color: var(--cyan); cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        #new-chat-btn:hover { background: rgba(0, 212, 255, 0.1); }
        #chat-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .chat-item { padding: 10px; margin-bottom: 5px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); }
        .chat-item:hover { background: rgba(255,255,255,0.08); }
        .chat-item.active { border-left: 3px solid var(--cyan); background: rgba(0, 212, 255, 0.05); }
        .edit-btn { opacity: 0.5; font-size: 0.7rem; cursor: pointer; }
        .edit-btn:hover { opacity: 1; color: var(--cyan); }

        /* Main Terminal */
        #app { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        #terminal { width: 85%; height: 85vh; background: var(--glass); border: 1px solid rgba(0, 212, 255, 0.2); display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 25px; border-bottom: 1px solid rgba(0, 212, 255, 0.1); display: flex; justify-content: space-between; align-items: center; }
        #feed { flex-grow: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .bubble { max-width: 80%; padding: 12px 18px; border-radius: 4px; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; }
        .user { align-self: flex-end; border-right: 3px solid var(--mag); background: rgba(255, 0, 255, 0.05); }
        .twin { align-self: flex-start; border-left: 3px solid var(--cyan); background: rgba(0, 212, 255, 0.05); color: #ccc; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: rgba(0,0,0,0.3); }
        input { flex-grow: 1; background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 12px; color: white; outline: none; }
        button#send-btn { background: var(--cyan); color: black; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<canvas id="starfield"></canvas>

<div id="sidebar">
    <div class="nav-header">
        <button id="new-chat-btn" onclick="createNewChat()">+ NEW NEURAL LINK</button>
    </div>
    <div id="chat-list"></div>
</div>

<div id="app">
    <div id="terminal">
        <header>
            <div style="color:var(--cyan); font-weight:bold; letter-spacing: 1px;">ATLAS V3.0</div>
            <div id="status" style="font-size:0.7rem; opacity:0.5;">STANDBY</div>
        </header>
        <div id="feed"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Establish link..." autocomplete="off">
            <button id="send-btn" onclick="sync()">SEND</button>
        </div>
    </div>
</div>

<script>
    // Starfield logic (Same as before)
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = Array.from({length: 150}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5, v: Math.random()*0.5}));
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#fff";
        stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y += s.v; if(s.y > canvas.height) s.y = 0; });
        requestAnimationFrame(draw);
    }
    init(); draw(); window.onresize = init;

    // Chat Management Logic
    let chats = JSON.parse(localStorage.getItem('atlas_chats')) || [];
    let currentChatId = null;

    function saveToLocal() {
        localStorage.setItem('atlas_chats', JSON.stringify(chats));
        renderSidebar();
    }

    function createNewChat() {
        const id = Date.now();
        const newChat = { id, name: "New Link...", messages: [] };
        chats.unshift(newChat);
        currentChatId = id;
        saveToLocal();
        loadChat(id);
    }

    function renderSidebar() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            item.innerHTML = `
                <span onclick="loadChat(${chat.id})">${chat.name}</span>
                <span class="edit-btn" onclick="renameChat(${chat.id})">✎</span>
            `;
            list.appendChild(item);
        });
    }

    function loadChat(id) {
        currentChatId = id;
        const chat = chats.find(c => c.id === id);
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        chat.messages.forEach(m => addMsgUI(m.text, m.role));
        renderSidebar();
    }

    function renameChat(id) {
        const chat = chats.find(c => c.id === id);
        const newName = prompt("Rename this link:", chat.name);
        if (newName) {
            chat.name = newName;
            saveToLocal();
        }
    }

    async function sync() {
        if (!currentChatId) createNewChat();
        
        const input = document.getElementById('userInput');
        const val = input.value.trim();
        if(!val) return;

        const chat = chats.find(c => c.id === currentChatId);
        
        // Add User message
        addMsgUI(val, 'user');
        chat.messages.push({ role: 'user', text: val });
        input.value = '';
        document.getElementById('status').innerText = "SYNCING...";

        // Auto-name chat if it's the first message
        if (chat.name === "New Link...") {
            chat.name = val.substring(0, 20) + "...";
        }

        try {
            const res = await fetch('/api/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    prompt: val,
                    history: chat.messages // Sending history for memory
                })
            });
            const data = await res.json();
            
            // Add Twin message
            addMsgUI(data.text, 'twin');
            chat.messages.push({ role: 'twin', text: data.text });
            saveToLocal();
            
            document.getElementById('status').innerText = "ACTIVE";
        } catch (e) {
            addMsgUI("Link failed. Check connection.", 'twin');
        }
    }

    function addMsgUI(txt, cls) {
        const d = document.createElement('div');
        d.className = `bubble ${cls}`;
        d.innerText = txt;
        const f = document.getElementById('feed');
        f.appendChild(d);
        f.scrollTop = f.scrollHeight;
    }

    // Initialize
    if (chats.length > 0) loadChat(chats[0].id);
    else createNewChat();

    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key==='Enter') sync(); });
</script>
</body>
</html>
